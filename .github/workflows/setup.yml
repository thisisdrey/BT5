name: Setup Repo

on:
  workflow_dispatch:  # allows manual trigger from Actions tab
#  push:
#    branches:
#      - main

permissions:
  contents: write
  actions: write

jobs:
  run-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"

      - name: Create key.json
        env:
          KEY_JSON: ${{ secrets.KEY_JSON }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          raw = os.environ.get("KEY_JSON", "")
          if not raw.strip():
              print("❌ KEY_JSON secret is empty")
              sys.exit(1)

          # Normalize smart quotes that may be introduced during copy/paste.
          normalized = (
              raw
              .replace("\u201c", "\"")
              .replace("\u201d", "\"")
              .replace("\u2018", "'")
              .replace("\u2019", "'")
          )

          try:
              payload = json.loads(normalized)
          except json.JSONDecodeError as exc:
              print(f"❌ KEY_JSON is not valid JSON: {exc}")
              print("   Ensure every value uses standard ASCII quotes and no line breaks inside strings.")
              sys.exit(1)

          if not isinstance(payload, dict) or not payload:
              print("❌ KEY_JSON must be a non-empty JSON object of username/token pairs.")
              sys.exit(1)

          Path("key.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(f"✅ key.json created with {len(payload)} account entries")
          PY

      - name: Run Setup Scope
        run: python setup/setup.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Setup"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin main
            if git push origin main; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi
