name: 7 Run Scanner Automation

on:
  workflow_dispatch:  # allows manual trigger from Actions tab
#  push:
#    branches:
#      - main


permissions:
  contents: write
  actions: write

jobs:
  run-deepwiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"

      - name: Check for scanned files
        id: check_audited
        run: |
          # Logic to check if there are files to process
          if [ -n "$(find scanned -name '*.md' | head -n 1)" ]; then
            echo "run_workflow=true" >> $GITHUB_OUTPUT
          else
            echo "run_workflow=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Validator
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        run: python run_generate_scanned_questions_pending.py

      - name: Commit and push changes
        if: steps.check_audited.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          git commit -m "Auto-update: collections and reports"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin main
            if git push --force origin main; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi


      - name: Trigger next batch after generate
        if: steps.check_audited.outputs.run_workflow == 'true'
        uses: nick-fields/retry@v3
        with:
          max_attempts: 2
          timeout_seconds: 60
          retry_on: 'error'
          retry_wait_seconds: 800  # 5 minutes between retries
          command: |
            #!/bin/bash
            set -e
            # Using curl directly with the GitHub API
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/7_run_scanner.yml/dispatches \
              -d '{"ref":"main"}'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run Validator
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        run: python run_scanner.py


      - name: Commit and push changes
        if: steps.check_audited.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          git commit -m "Auto-update: collections and reports"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin main
            if git push --force origin main; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi



      - name: Check queued and running depth for this workflow
        id: queue_guard
        if: steps.check_audited.outputs.run_workflow == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          base_url="https://api.github.com/repos/${{ github.repository }}/actions/workflows/7_run_scanner.yml/runs?branch=main&event=workflow_dispatch&per_page=1"

          get_count() {
            local status="$1"
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${base_url}&status=${status}" \
            | python -c 'import sys,json; print(json.load(sys.stdin)["total_count"])'
          }

          queued="$(get_count queued)"
          running="$(get_count in_progress)"
          total=$((queued + running))

          echo "queued=$queued" >> "$GITHUB_OUTPUT"
          echo "running=$running" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"

          if [ "$total" -lt 15 ]; then
            echo "can_dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_dispatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger next batch after generate
        if: steps.check_audited.outputs.run_workflow == 'true' && steps.queue_guard.outputs.can_dispatch == 'true'
        uses: nick-fields/retry@v3
        with:
          max_attempts: 1
          timeout_seconds: 60
          retry_on: 'error'
          retry_wait_seconds: 500
          command: |
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/7_run_scanner.yml/dispatches \
              -d '{"ref":"main"}'

