image: python:3.11-bookworm

stages:
  - setup
  - split_scope
  - question_generator
  - question_generator_questions
  - automation
  - report
  - validator
  - scanner
  - validator_report
  - cleanup

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  GIT_DEPTH: "0"
  SELF_DISPATCH: "false"

.default_job:
  resource_group: hdn-file-queue
  before_script:
    - |
      set -euo pipefail

      apt-get update
      apt-get install -y curl git gnupg wget unzip xvfb xclip

      if ! command -v google-chrome >/dev/null 2>&1; then
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
        apt-get update
        apt-get install -y google-chrome-stable
      fi

      python -m pip install --upgrade pip
      pip install selenium webdriver-manager
      pip install -r requirements.txt || echo "No requirements.txt found, skipping"

      git config --local user.email "gitlab-ci-bot@example.com"
      git config --local user.name "GitLab CI Bot"

      target_branch="${CI_COMMIT_BRANCH:-${CI_DEFAULT_BRANCH:-main}}"
      export GITHUB_RUN_NUMBER="${GITHUB_RUN_NUMBER:-${CI_PIPELINE_IID:-0}}"

      has_json() {
        find "$1" -maxdepth 1 -name '*.json' 2>/dev/null | head -n 1 | grep -q .
      }

      has_md() {
        find "$1" -maxdepth 1 -name '*.md' 2>/dev/null | head -n 1 | grep -q .
      }

      has_scanned_md() {
        find scanned -mindepth 2 -name '*.md' 2>/dev/null | head -n 1 | grep -q .
      }

      persist_changes() {
        message="$1"
        git add -A

        if git diff --staged --quiet; then
          echo "No changes to commit"
          return 0
        fi

        git commit -m "$message"

        if [ -n "${CI_PUSH_TOKEN:-}" ]; then
          push_remote="https://oauth2:${CI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        else
          push_remote="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        fi

        n=0
        until [ "$n" -ge 3 ]; do
          git fetch "$push_remote" "$target_branch"
          if git rebase FETCH_HEAD && git push "$push_remote" "HEAD:${target_branch}"; then
            echo "Push succeeded"
            return 0
          fi

          git rebase --abort 2>/dev/null || true
          n=$((n + 1))
          echo "Push failed, retrying in 5 seconds..."
          sleep 5
        done

        echo "Failed to push after 3 attempts"
        return 1
      }

      trigger_self() {
        job_name="$1"

        if [ "${SELF_DISPATCH:-false}" != "true" ]; then
          echo "SELF_DISPATCH is false; not triggering ${job_name} again"
          return 0
        fi

        if [ -z "${GITLAB_TRIGGER_TOKEN:-}" ]; then
          echo "GITLAB_TRIGGER_TOKEN is not set; cannot trigger ${job_name} again"
          return 0
        fi

        curl --fail --retry 5 --retry-delay 300 --request POST \
          --form "token=${GITLAB_TRIGGER_TOKEN}" \
          --form "ref=${target_branch}" \
          --form "variables[RUN_JOB]=${job_name}" \
          --form "variables[SELF_DISPATCH]=${SELF_DISPATCH}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/trigger/pipeline"
      }

.manual_or_trigger_setup: &manual_or_trigger_setup
  rules:
    - if: '$RUN_JOB == "setup"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "push"'
      when: manual
      allow_failure: true
    - when: never

