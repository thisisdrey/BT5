setup:
  extends: .default_job
  stage: setup
  <<: *manual_or_trigger_setup
  script:
    - |
      python3 - <<'PY'
      import base64
      import json
      import os
      import sys
      from pathlib import Path

      raw_b64 = os.environ.get("KEY_JSON_B64", "")
      if raw_b64.strip():
          try:
              raw = base64.b64decode(raw_b64.strip()).decode("utf-8")
          except Exception as exc:
              print(f"KEY_JSON_B64 is not valid base64 JSON: {exc}")
              sys.exit(1)
      else:
          raw = os.environ.get("KEY_JSON", "")

      if not raw.strip():
          print("KEY_JSON_B64/KEY_JSON variable is empty")
          sys.exit(1)

      normalized = (
          raw
          .replace("\u201c", '"')
          .replace("\u201d", '"')
          .replace("\u2018", "'")
          .replace("\u2019", "'")
      )

      try:
          payload = json.loads(normalized)
      except json.JSONDecodeError as exc:
          print(f"KEY_JSON is not valid JSON: {exc}")
          sys.exit(1)

      if not isinstance(payload, dict) or not payload:
          print("KEY_JSON must be a non-empty JSON object of username/token pairs.")
          sys.exit(1)

      Path("key.json").write_text(
          json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
          encoding="utf-8",
      )
      print(f"key.json created with {len(payload)} account entries")
      PY
      python setup/setup.py
      persist_changes "Setup"

setup_index:
  extends: .default_job
  stage: setup
  <<: *manual_or_trigger_setup_index
  script:
    - xvfb-run --auto-servernum python setup/index_deepwiki.py

1_split_scope:
  extends: .default_job
  stage: split_scope
  <<: *manual_or_trigger_1
  script:
    - |
      python run_split_all_scope_questions.py
      persist_changes "Auto-update: split scope"

2_run_question_generator:
  extends: .default_job
  stage: question_generator
  <<: *manual_or_trigger_2
  script:
    - |
      if ! has_json scope; then
        echo "No scope files found, skipping workflow"
        exit 0
      fi

      python run_questions_generator_generate.py
      persist_changes "Auto-update: question generator pending scope"

      python run_questions_generator.py
      persist_changes "Auto-update: generated scope questions"

      if has_json scope; then
        trigger_self "2_run_question_generator"
      fi

3_run_question_generator_questions:
  extends: .default_job
  stage: question_generator_questions
  <<: *manual_or_trigger_3
  script:
    - |
      if ! has_json scope_questions; then
        echo "No scope question files found, skipping workflow"
        exit 0
      fi

      python run_questions_generator_report_generate.py
      persist_changes "Auto-update: scope question report pending files"

      xvfb-run --auto-servernum python run_questions_generator_report.py
      persist_changes "Auto-update: generated audit questions"

      if has_json scope_questions; then
        trigger_self "3_run_question_generator_questions"
      fi

4_run_automation:
  extends: .default_job
  stage: automation
  <<: *manual_or_trigger_4
  script:
    - |
      if ! has_json question; then
        echo "No question files found, skipping workflow"
        exit 0
      fi

      python run_generate_file.py
      persist_changes "Auto-update: automation pending question"

      python run_automation.py
      persist_changes "Auto-update: automation URLs"

      if has_json question; then
        trigger_self "4_run_automation"
      fi

5_run_report:
  extends: .default_job
  stage: report
  <<: *manual_or_trigger_5
  script:
    - |
      if ! has_json automation; then
        echo "No automation files found, skipping workflow"
        exit 0
      fi

      python run_automation_report_generate.py
      persist_changes "Auto-update: automation report pending files"

      xvfb-run --auto-servernum python run_automation_report.py
      persist_changes "Auto-update: audited reports"

      if has_json automation; then
        trigger_self "5_run_report"
      fi

6_run_validator:
  extends: .default_job
  stage: validator
  <<: *manual_or_trigger_6
  script:
    - |
      if ! has_md audited; then
        echo "No audited files found, skipping workflow"
        exit 0
      fi

      python run_generate_validated_questions_pending.py
      persist_changes "Auto-update: validator pending files"

      python run_validator.py
      persist_changes "Auto-update: validated question URLs"

      if has_md audited; then
        trigger_self "6_run_validator"
      fi

7_run_scanner:
  extends: .default_job
  stage: scanner
  <<: *manual_or_trigger_7
  script:
    - |
      if ! has_scanned_md; then
        echo "No scanned markdown files found, skipping workflow"
        exit 0
      fi

      python run_generate_scanned_questions_pending.py
      persist_changes "Auto-update: scanner pending files"

      python run_scanner.py
      persist_changes "Auto-update: scanned validation URLs"

      if has_scanned_md; then
        trigger_self "7_run_scanner"
      fi

8_run_validator_report:
  extends: .default_job
  stage: validator_report
  <<: *manual_or_trigger_8
  script:
    - |
      if ! has_json validated_questions; then
        echo "No validated question files found, skipping workflow"
        exit 0
      fi

      python run_validator_report_generate.py
      persist_changes "Auto-update: validation report pending files"

      xvfb-run --auto-servernum python run_validator_report.py
      persist_changes "Auto-update: validated reports"

      if has_json validated_questions; then
        trigger_self "8_run_validator_report"
      fi

9_run_clean_up:
  extends: .default_job
  stage: cleanup
  <<: *manual_or_trigger_9
  script:
    - |
      python run_clean_up.py
      persist_changes "Auto-update: clean up and reports"
